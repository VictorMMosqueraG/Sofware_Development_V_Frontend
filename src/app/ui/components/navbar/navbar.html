<aside class="sidebar" [class.open]="open">

  <!-- ── Header ── -->
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark">R</div>
      <div class="logo-text">
        <span class="logo-name">Restaurante</span>
        <span class="logo-tag">Sistema de Gestión</span>
      </div>
    </div>
    <button class="btn-toggle" (click)="toggle.emit()" title="Cerrar menú">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
  </div>

  <!-- ── Nav groups ── -->
  <nav class="nav">
    @for (group of groups; track group.title) {
      <div class="group" [class.is-expanded]="isExpanded(group.title)" [class.has-active]="isGroupActive(group)">

        <button class="group-btn" (click)="toggleGroup(group.title)">
          <span class="group-label">{{ group.title }}</span>
          <svg class="group-arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M9 6l6 6-6 6"/>
          </svg>
        </button>

        @if (isExpanded(group.title)) {
          <ul class="group-list">
            @for (item of group.items; track item.route) {
              <li>
                <a class="link" [routerLink]="item.route" routerLinkActive="link--active">
                  <span class="link-dot"></span>
                  <span>{{ item.label }}</span>
                </a>
              </li>
            }
          </ul>
        }
      </div>
    }
  </nav>

  <!-- ── Footer ── -->
  <div class="sidebar-footer">
    <div class="footer-line"></div>
    <span class="footer-copy">Restaurant Management v1.0</span>
  </div>
</aside>

<!-- Hamburger when closed -->
@if (!open) {
  <button class="hamburger" (click)="toggle.emit()" title="Abrir menú">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M3 12h18M3 6h18M3 18h18"/>
    </svg>
  </button>
}
